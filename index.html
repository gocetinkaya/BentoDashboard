                    return `
                        <div class="note-container w-full h-full flex flex-col p-6 group/note text-current relative overflow-hidden">
                            <div id="note-title-${w.id}" contenteditable="true" onblur="saveNoteTitle('${w.id}')" data-placeholder="Title" class="allow-select note-title outline-none text-[10px] md:text-sm font-semibold uppercase tracking-widest opacity-60 mb-2 transition-all">${w.data.title || ''}</div>
                            ${noteBody}
                            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 opacity-0 group-focus-within/note:opacity-100 transition-opacity bg-black/40 dark:bg-white/20 backdrop-blur-xl rounded-full px-3 py-1 flex gap-2 items-center shadow-lg z-30 pointer-events-none group-focus-within/note:pointer-events-auto ${isEditMode ? 'hidden' : ''}">
                                ${isList ? `
                                <button onmousedown="event.preventDefault(); toggleNoteMode('${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95" title="Paragraph Mode"><i data-lucide="align-left" class="w-3.5 h-3.5"></i></button>
                                <div class="w-px h-4 bg-white/30 mx-1"></div>
                                <button onmousedown="event.preventDefault(); copyNoteText('${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95" title="Copy"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                                ` : `
                                <button onmousedown="event.preventDefault(); copyNoteText('${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95" title="Copy"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                                <div class="w-px h-4 bg-white/30 mx-1"></div>
                                <button onmousedown="event.preventDefault(); execNoteCmd('bold', '${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95"><i data-lucide="bold" class="w-3.5 h-3.5"></i></button>
                                <button onmousedown="event.preventDefault(); execNoteCmd('italic', '${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95"><i data-lucide="italic" class="w-3.5 h-3.5"></i></button>
                                <button onmousedown="event.preventDefault(); execNoteCmd('underline', '${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95"><i data-lucide="underline" class="w-3.5 h-3.5"></i></button>
                                <button onmousedown="event.preventDefault(); execNoteCmd('hiliteColor', '${w.id}', '${acColor}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95"><i data-lucide="highlighter" class="w-3.5 h-3.5"></i></button>
                                <button onmousedown="event.preventDefault(); execNoteCmd('removeFormat', '${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95" title="Clear Formatting">${getFormatClearIcon()}</button>
                                <div class="w-px h-4 bg-white/30 mx-1"></div>
                                <button onmousedown="event.preventDefault(); toggleNoteMode('${w.id}')" class="p-1.5 hover:bg-white/20 rounded-full text-white transition cursor-pointer hover:scale-110 active:scale-95" title="Checklist Mode"><i data-lucide="list-todo" class="w-3.5 h-3.5"></i></button>
                                `}
                            </div>
                        </div>
                    `;

                case 'calendar': 
                    return generateCalendarHTML(w, Math.min(w.w, window.innerWidth < 768 ? 4 : 6), w.h);
            }
        }

        /** CALENDAR VIEW GENERATOR **/
        function generateCalendarHTML(wObj, w, h) {
            const id = wObj.id;
            const offset = calendarOffsets[id] || 0;
            const accentColor = wObj.data.accentColor || appState.settings.accentColor || '#ef4444';
            const now = new Date(); const viewingDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);
            const isCurrentMonth = offset === 0; const today = now.getDate();
            const monthStr = viewingDate.toLocaleString('en-US', {month:'long'}).toUpperCase();
            const dayStr = now.toLocaleString('en-US', {weekday:'short'}).toUpperCase();
            const daysArr = appState.settings.weekStart === 1 ? ['M','T','W','T','F','S','S'] : ['S','M','T','W','T','F','S'];

            if(w === 1 && h === 1) { return `<div class="w-full h-full flex flex-col items-center justify-center p-4 text-current"><span class="text-[10px] md:text-sm font-semibold uppercase tracking-widest opacity-60 mb-1" style="color: ${accentColor};">${dayStr}</span><span class="text-4xl font-black tracking-tighter">${today}</span></div>`; }
            
            if(w === 1 && h > 1) { 
                let weekDates = []; let curr = new Date();
                let first = curr.getDate() - curr.getDay() + (appState.settings.weekStart===1?1:0);
                if(curr.getDay()===0 && appState.settings.weekStart===1) first -= 7; 
                for(let i=0; i<7; i++) { let d = new Date(curr.getFullYear(), curr.getMonth(), first + i); weekDates.push({ date: d.getDate(), isToday: d.getDate() === today && d.getMonth() === now.getMonth() }); }
                
                let html = `<div class="w-full h-full flex flex-col items-center justify-between p-4 md:p-5 text-current">`;
                for(let i=0; i<7; i++) {
                    let isT = weekDates[i].isToday;
                    html += `<div class="flex flex-col items-center justify-center flex-1 w-full h-[13%] rounded-xl md:rounded-2xl ${isT ? 'text-white shadow-md' : 'opacity-70 text-current'}" ${isT ? `style="background-color: ${accentColor};"` : ''}><span class="text-[9px] font-bold uppercase mb-0.5">${daysArr[i]}</span><span class="text-sm font-bold">${weekDates[i].date}</span></div>`;
                }
                html += `</div>`; return html;
            }

            if(h === 1 && w > 1) { 
                let weekDates = []; let curr = new Date();
                let first = curr.getDate() - curr.getDay() + (appState.settings.weekStart===1?1:0);
                if(curr.getDay()===0 && appState.settings.weekStart===1) first -= 7; 
                for(let i=0; i<7; i++) { let d = new Date(curr.getFullYear(), curr.getMonth(), first + i); weekDates.push({ date: d.getDate(), isToday: d.getDate() === today && d.getMonth() === now.getMonth() }); }
                
                let html = `<div class="w-full h-full flex justify-between items-center p-4 md:p-5 text-current">`;
                for(let i=0; i<7; i++) {
                    let isT = weekDates[i].isToday;
                    html += `<div class="flex flex-col items-center justify-center h-full w-[13%] rounded-xl md:rounded-2xl ${isT ? 'text-white shadow-md' : 'opacity-70 text-current'}" ${isT ? `style="background-color: ${accentColor};"` : ''}><span class="text-[10px] font-bold uppercase mb-0.5 ${isT?'opacity-100':'opacity-50'}">${daysArr[i]}</span><span class="text-base md:text-xl font-bold">${weekDates[i].date}</span></div>`;
                }
                html += `</div>`; return html;
            }

            const headClass = w >= 4 ? 'text-lg md:text-xl' : 'text-sm md:text-base';
            const numClass = w >= 3 ? 'text-sm md:text-lg' : 'text-xs md:text-sm';
            const circleSize = w >= 4 ? 'w-8 h-8 md:w-10 md:h-10' : 'w-6 h-6 md:w-8 md:h-8';
            
            const isGiant = h >= 3; 
            const gridLayoutClass = isGiant ? 'flex-1 grid grid-rows-[repeat(6,minmax(0,1fr))] items-center gap-1' : 'gap-y-1.5 md:gap-y-2 content-start flex-1';
            const cellLayoutClass = isGiant ? 'flex items-center justify-center h-full w-full' : 'flex items-center justify-center h-7 md:h-8';

            let html = `<div class="flex flex-col h-full p-4 md:p-5 w-full mx-auto relative group/cal text-current">
                <div class="flex items-center justify-between mb-2 md:mb-4 w-full" style="padding-left: calc(100% / 14 - 6px); padding-right: calc(100% / 14 - 6px);">
                    <div class="${headClass} font-bold uppercase tracking-widest text-left leading-none" style="color: ${accentColor};">${monthStr} ${viewingDate.getFullYear()}</div>
                    <div class="flex items-center gap-1 opacity-0 group-hover/cal:opacity-100 transition-opacity gpu-hover-layer ${isEditMode ? 'hidden' : ''}">
                        ${!isCurrentMonth ? `<button onclick="changeCalOffset('${id}', 0)" class="text-[10px] font-bold px-2 py-1 bg-black/10 dark:bg-white/10 rounded mr-2 uppercase transition cursor-pointer hover:scale-105 active:scale-95">Today</button>` : ''}
                        <button onclick="changeCalOffset('${id}', -1)" class="p-1 hover:bg-black/10 dark:bg-white/10 rounded transition cursor-pointer hover:scale-110 active:scale-95"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button onclick="changeCalOffset('${id}', 1)" class="p-1 hover:bg-black/10 dark:bg-white/10 rounded transition cursor-pointer hover:scale-110 active:scale-95"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[9px] md:text-xs font-bold opacity-50 uppercase mb-1 md:mb-2">`;
            daysArr.forEach(d => html += `<div>${d}</div>`);
            html += `</div><div class="grid grid-cols-7 ${gridLayoutClass} text-center ${numClass}">`;

            let startOffset = new Date(viewingDate.getFullYear(), viewingDate.getMonth(), 1).getDay() - appState.settings.weekStart;
            if(startOffset < 0) startOffset += 7;
            for(let i=0; i<startOffset; i++) html += `<div></div>`;
            for(let i=1; i<=new Date(viewingDate.getFullYear(), viewingDate.getMonth() + 1, 0).getDate(); i++) {
                if(isCurrentMonth && i === today) {
                    html += `<div class="${cellLayoutClass}"><div class="flex items-center justify-center ${circleSize} text-white rounded-full font-bold shadow-md m-0" style="background-color: ${accentColor};">${i}</div></div>`;
                } else {
                    html += `<div class="${cellLayoutClass} font-medium opacity-80">${i}</div>`;
                }
            }
            html += `</div></div>`; return html;
        }
        function changeCalOffset(id, diff) { 
            calendarOffsets[id] = diff === 0 ? 0 : (calendarOffsets[id] || 0) + diff; 
            reRenderWidget(id);
        }

        /** NOTES LOGIC **/
        function execNoteCmd(cmd, id, val = null) { 
            if(cmd === 'hiliteColor') { document.execCommand('backColor', false, val); }
            else { document.execCommand(cmd, false, null); }
            saveNoteData(id);
            window.getSelection().removeAllRanges();
        }
        function saveNoteTitle(id) {
            const el = document.getElementById(`note-title-${id}`); 
            if(el) { 
                let cleanTxt = el.innerHTML.replace(/<br\s*[\/]?>/gi, '').replace(/&nbsp;/g, ' ').trim();
                if(cleanTxt === '') el.innerHTML = ''; 
                const w = getCurrentWidgets().find(w => w.id === id); 
                if(w) { w.data.title = el.innerText.trim(); saveState(); } 
            } 
        }
        function saveNoteData(id) { 
            const el = document.getElementById(`note-text-${id}`); 
            if(el) { const w = getCurrentWidgets().find(w => w.id === id); if(w) { w.data.text = el.innerHTML; saveState(); } } 
        }
        function copyNoteText(id) {
            const w = getCurrentWidgets().find(wd => wd.id === id);
            if(!w) return;
            
            if(w.data.isListMode) {
                const temp = document.createElement('div');
                temp.innerHTML = '<ul style="list-style-type: none; padding: 0; margin: 0;">' + 
                    (w.data.tasks || []).map(t => `<li style="margin-bottom: 4px;">- ${t.text}</li>`).join('') + 
                    '</ul>';
                document.body.appendChild(temp);
                const range = document.createRange();
                range.selectNodeContents(temp);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                document.execCommand('copy');
                sel.removeAllRanges();
                temp.remove();
                showToast('List Copied!');
            } else {
                const el = document.getElementById(`note-text-${id}`);
                if(el) {
                    const range = document.createRange();
                    range.selectNodeContents(el);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                    document.execCommand('copy');
                    sel.removeAllRanges();
                    showToast('Note Copied!');
                }
            }
        }
        function toggleNoteMode(id) {
            const w = getCurrentWidgets().find(w => w.id === id);
            if(!w) return;
            if(w.data.isListMode) {
                const lines = (w.data.tasks || []).map(t => t.text).join('<br>');
                w.data.text = lines;
                w.data.isListMode = false;
            } else {
                const el = document.getElementById(`note-text-${id}`);
                const htmlStr = el ? el.innerHTML : (w.data.text || '');
                const lines = htmlStr.split(/<br\s*\/?>|<div>/i).map(l => l.replace(/<\/div>/gi, '').trim()).filter(l => l);
                w.data.tasks = lines.map(l => ({ id: 't_'+Date.now()+'_'+Math.random().toString(36).substr(2,5), text: l, checked: false }));
                w.data.isListMode = true;
            }
            saveState(); 
            reRenderWidget(id);
            setTimeout(() => {
                const widgetEl = document.querySelector(`[data-id="${id}"]`);
                if(widgetEl) {
                    const textInput = widgetEl.querySelector('div[contenteditable]:not(.note-title)');
                    if(textInput) textInput.focus();
                }
            }, 10);
        }
        
        function handleTaskKey(e, wId, tId) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const el = e.target;
                updateTask(wId, tId, el.innerHTML);
                
                const w = getCurrentWidgets().find(w => w.id === wId);
                const idx = w.data.tasks.findIndex(t => t.id === tId);
                
                const newId = 't_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                w.data.tasks.splice(idx + 1, 0, { id: newId, text: '', checked: false });
                saveState();
                
                const taskHtml = `
                    <div class="flex items-start gap-2 mb-2 group/task relative checklist-mode-task" id="node-${newId}">
                        <button onmousedown="event.preventDefault()" onclick="toggleTask('${wId}', '${newId}')" class="mt-0.5 shrink-0 w-3.5 h-3.5 rounded-full border border-current flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition-colors opacity-80 cursor-pointer"></button>
                        <div contenteditable="true" onkeydown="handleTaskKey(event, '${wId}', '${newId}')" onblur="updateTask('${wId}', '${newId}', this.innerHTML)" class="allow-select flex-1 bg-transparent border-none outline-none text-sm font-medium opacity-80 focus:opacity-100"></div>
                        <button onmousedown="event.preventDefault()" onclick="deleteTask('${wId}', '${newId}')" class="opacity-0 group-hover/task:opacity-100 text-current transition-opacity absolute right-0 px-1 hover:scale-110 active:scale-95 cursor-pointer flex items-center justify-center h-full bg-transparent border-none shadow-none"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                    </div>
                `;
                el.parentElement.insertAdjacentHTML('afterend', taskHtml);
                lucide.createIcons({ root: el.parentElement.nextElementSibling });
                
                const newDiv = el.parentElement.nextElementSibling.querySelector('div[contenteditable]');
                if (newDiv) newDiv.focus();
            } else if (e.key === 'Backspace' && e.target.innerHTML === '') {
                e.preventDefault();
                const w = getCurrentWidgets().find(w => w.id === wId);
                const idx = w.data.tasks.findIndex(t => t.id === tId);
                if (idx > 0) {
                    const prevEl = e.target.parentElement.previousElementSibling?.querySelector('div[contenteditable]');
                    e.target.parentElement.remove();
                    w.data.tasks.splice(idx, 1);
                    saveState();
                    if (prevEl) {
                        prevEl.focus();
                        const range = document.createRange(); const sel = window.getSelection();
                        range.selectNodeContents(prevEl); range.collapse(false);
                        sel.removeAllRanges(); sel.addRange(range);
                    }
                }
            }
        }
        
        function toggleTask(wId, tId) {
            const w = getCurrentWidgets().find(w => w.id === wId);
            const t = w.data.tasks.find(t => t.id === tId);
            if (t) {
                t.checked = !t.checked;
                saveState();
                
                const el = document.getElementById(`node-${tId}`);
                if (el) {
                    const targetList = t.checked ? document.getElementById(`tasks-done-${wId}`) : document.getElementById(`tasks-active-${wId}`);
                    if (targetList) {
                        targetList.appendChild(el);
                        const btn = el.querySelector('button');
                        btn.innerHTML = t.checked ? `<i data-lucide="check" class="w-2.5 h-2.5"></i>` : '';
                        lucide.createIcons({ root: btn });
                        const textDiv = el.querySelector('div[contenteditable]');
                        textDiv.className = `allow-select flex-1 bg-transparent border-none outline-none text-sm font-medium ${t.checked ? 'line-through opacity-40' : 'opacity-80 focus:opacity-100'}`;
                    }
                    
                    const divider = document.getElementById(`tasks-divider-${wId}`);
                    const doneList = document.getElementById(`tasks-done-${wId}`);
                    if(divider && doneList) {
                        if(doneList.children.length > 0) divider.classList.remove('hidden');
                        else divider.classList.add('hidden');
                    }
                }
            }
        }
        
        function updateTask(wId, tId, htmlVal) {
            const w = getCurrentWidgets().find(w => w.id === wId);
            const t = w.data.tasks.find(t => t.id === tId);
            if(t) { t.text = htmlVal; saveState(); }
        }
        function deleteTask(wId, tId) {
            const w = getCurrentWidgets().find(w => w.id === wId);
            w.data.tasks = w.data.tasks.filter(t => t.id !== tId);
            saveState();
            const el = document.getElementById(`node-${tId}`);
            if (el) el.remove();
            
            const divider = document.getElementById(`tasks-divider-${wId}`);
            const doneList = document.getElementById(`tasks-done-${wId}`);
            if(divider && doneList) {
                if(doneList.children.length > 0) divider.classList.remove('hidden');
                else divider.classList.add('hidden');
            }
        }
        function addTask(wId) {
            const w = getCurrentWidgets().find(w => w.id === wId);
            const newId = 't_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            w.data.tasks.push({ id: newId, text: '', checked: false });
            saveState();
            
            const taskHtml = `
                <div class="flex items-start gap-2 mb-2 group/task relative checklist-mode-task" id="node-${newId}">
                    <button onmousedown="event.preventDefault()" onclick="toggleTask('${wId}', '${newId}')" class="mt-0.5 shrink-0 w-3.5 h-3.5 rounded-full border border-current flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition-colors opacity-80 cursor-pointer"></button>
                    <div contenteditable="true" onkeydown="handleTaskKey(event, '${wId}', '${newId}')" onblur="updateTask('${wId}', '${newId}', this.innerHTML)" class="allow-select flex-1 bg-transparent border-none outline-none text-sm font-medium opacity-80 focus:opacity-100"></div>
                    <button onmousedown="event.preventDefault()" onclick="deleteTask('${wId}', '${newId}')" class="opacity-0 group-hover/task:opacity-100 text-current transition-opacity absolute right-0 px-1 hover:scale-110 active:scale-95 cursor-pointer flex items-center justify-center h-full bg-transparent border-none shadow-none"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                </div>
            `;
            const activeList = document.getElementById(`tasks-active-${wId}`);
            if(activeList) {
                activeList.insertAdjacentHTML('beforeend', taskHtml);
                lucide.createIcons({ root: activeList.lastElementChild });
                const newDiv = activeList.lastElementChild.querySelector('div[contenteditable]');
                if (newDiv) newDiv.focus();
            }
        }

        function requirePassword(password, callback, title="Enter Password") {
            if(!password) { callback(); return; }
            expectedPassword = password; pendingPasswordCallback = callback;
            const modalTitle = document.getElementById('pw-modal-title'); if(modalTitle) modalTitle.innerText = title;
            const input = document.getElementById('pw-modal-input'); if(input) input.value = '';
            showModal('password-modal'); setTimeout(() => { if(input) input.focus(); }, 100);
        }

        function submitPassword() {
            const val = document.getElementById('pw-modal-input').value;
            if(val === expectedPassword) { hideModal('password-modal'); if(pendingPasswordCallback) pendingPasswordCallback(); } 
            else { showToast('Incorrect Password'); const input = document.getElementById('pw-modal-input'); input.value = ''; input.focus(); }
        }

        function executeSmartAction(id) {
            if(isEditMode) return; const w = getCurrentWidgets().find(w => w.id === id);
            requirePassword(w.data.password, () => {
                if(w.data.action === 'space') { 
                    navigateSpace(w.id); 
                }
                else if(w.data.action === 'copy') {
                    const el = document.createElement('textarea');
                    el.value = w.data.content || '';
                    el.setAttribute('readonly', '');
                    el.style.position = 'absolute';
                    el.style.left = '-9999px';
                    document.body.appendChild(el);
                    el.select();
                    try { document.execCommand('copy'); showToast('Copied to clipboard!'); } catch(e) { showToast('Failed to copy!'); }
                    document.body.removeChild(el);
                }
            }, 'Unlock Widget');
        }

        function toggleSearch() {
            if(!isSearching) {
                setSearchScope('all');
                document.getElementById('search-container').classList.add('active');
                document.getElementById('search-input').focus();
                document.getElementById('btn-edit-mode').classList.add('hidden');
                
                transitionGrid('translate3d(0,50px,0)', 'translate3d(0,50px,0)', () => {
                    isSearching = true;
                    performSearch();
                });
            } else {
                document.getElementById('search-container').classList.remove('active');
                document.getElementById('search-input').value = '';
                searchResults = [];
                if(!isEditMode) document.getElementById('btn-edit-mode').classList.remove('hidden');
                
                transitionGrid('translate3d(0,50px,0)', 'translate3d(0,50px,0)', () => {
                    isSearching = false;
                    renderDashboard();
                });
            }
        }
        function clearSearch() { document.getElementById('search-input').value = ''; performSearch(); }
        function setSearchScope(s) { 
            searchScope = s; 
            document.getElementById('btn-scope-all').className = s === 'all' ? 'px-5 py-2.5 rounded-full bg-white text-black dark:bg-black dark:text-white shadow-md transition cursor-pointer' : 'px-5 py-2.5 rounded-full opacity-60 hover:opacity-100 transition cursor-pointer text-current'; 
            document.getElementById('btn-scope-current').className = s === 'current' ? 'px-5 py-2.5 rounded-full bg-white text-black dark:bg-black dark:text-white shadow-md transition cursor-pointer' : 'px-5 py-2.5 rounded-full opacity-60 hover:opacity-100 transition cursor-pointer text-current'; 
            performSearch(); 
        }
        function performSearch() {
            const q = document.getElementById('search-input').value.toLowerCase(); searchResults = [];
            if(!q) { renderDashboard(); return; }
            const spacesToSearch = searchScope === 'all' ? Object.keys(appState.spaces) : [spaceStack[spaceStack.length - 1]];
            spacesToSearch.forEach(sId => { 
                appState.spaces[sId].widgets.forEach(w => { 
                    let match = false;
                    if(w.data?.title?.toLowerCase().includes(q)) match = true;
                    if(w.data?.text?.toLowerCase().includes(q)) match = true;
                    if(w.data?.city?.toLowerCase().includes(q)) match = true;
                    if(!w.data?.password && w.data?.content?.toLowerCase().includes(q)) match = true;
                    if(match) searchResults.push({...w}); 
                }); 
            });
            renderDashboard();
        }

            const ewTrash = document.getElementById('ew-trash-btn');
            if (ewTrash) ewTrash.style.display = hasImg ? 'block' : 'none';

            const ebLabel = document.getElementById('eb-upload-label');
            if (ebLabel) ebLabel.innerHTML = `${hasImg ? 'Replace Image' : 'Upload Image'} <input type="file" id="eb-photo" class="hidden" accept="image/*" onchange="handleWidgetPhoto(event)">`;
            const ebTrash = document.getElementById('eb-trash-btn');
            if (ebTrash) ebTrash.style.display = hasImg ? 'block' : 'none';
        }

        function setTimerMode(mode) {
            const dirInput = document.getElementById('eb-timer-dir');
            if (dirInput) dirInput.value = mode;
            
            const btnDown = document.getElementById('btn-timer-down');
            const btnUp = document.getElementById('btn-timer-up');
            
            if (mode === 'down') {
                if (btnDown) btnDown.className = 'flex-1 py-1.5 text-xs font-bold bg-white dark:bg-white/20 shadow-sm rounded cursor-pointer transition text-current';

        async function resolveTimeZone(city) {
            if(!city) return null;
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
                const data = await res.json();
                if(data.results && data.results.length > 0) return data.results[0].timezone;
            } catch(e) {}
            return null;
        }

        function setSmartAction(act, fromClick = false) {
            document.getElementById('ew-type').value = act;
            ['none', 'link', 'copy', 'space'].forEach(a => { document.getElementById(`btn-act-${a}`).className = a === act ? 'p-2 rounded-xl text-xs font-bold flex flex-col items-center gap-1 transition cursor-pointer bg-blue-500 text-white shadow-md border-transparent' : 'p-2 rounded-xl border border-black/10 dark:border-white/10 text-xs font-bold flex flex-col items-center gap-1 transition opacity-70 hover:opacity-100 cursor-pointer text-current'; });
            const wrap = document.getElementById('ew-content-wrap'), lbl = document.getElementById('ew-content-label');
            if(act === 'none' || act === 'space') { wrap.style.display = 'none'; } else { wrap.style.display = 'block'; lbl.innerText = act === 'link' ? 'URL Link' : 'Text to Copy'; }
            
            if (fromClick) {
                if(act === 'space') setTempIcon('folder', false);
                else if(act === 'link') setTempIcon('link', false);
                else if(act === 'copy') setTempIcon('copy', false);
                else if(act === 'none') setTempIcon('image', false);
            }
        }

            const wrap = document.getElementById('ew-password-wrap');

            document.getElementById('tab-emojis').className = tab === 'emojis'

                : 'flex-1 py-1.5 text-[10px] tracking-widest uppercase font-medium rounded opacity-50 hover:opacity-100 cursor-pointer text-current transition';

        function handleWidgetPhoto(e) {
            const file = e.target.files[0]; if(!file) return; 
            showToast("Uploading...");
            compressImage(file, base64 => { 
                const w = getCurrentWidgets().find(w => w.id === currentEditId); 
                w.data.bgImage = base64; 
                saveState(); renderDashboard(); 
                refreshUploadUI(true);
                showToast("Image Uploaded");
            });
        }
        function clearWidgetPhoto() { 
            const w = getCurrentWidgets().find(w => w.id === currentEditId); 
            w.data.bgImage = null; 
            saveState(); renderDashboard(); 
            refreshUploadUI(false);
        }

        function saveSmartWidget() {
            const w = getCurrentWidgets().find(w => w.id === currentEditId);
            w.data.action = document.getElementById('ew-type').value; w.data.title = document.getElementById('ew-title').value; w.data.content = document.getElementById('ew-content').value;
            w.data.icon = tempIconData.icon; w.data.isEmoji = tempIconData.isEmoji; w.data.password = document.getElementById('ew-req-pass').checked ? document.getElementById('ew-password').value : null; w.data.overlay = document.getElementById('ew-img-overlay').checked;
            
            w.data.transparent = document.getElementById('ew-trans').checked;
            w.data.textColor = document.getElementById('ew-use-text-color').checked ? document.getElementById('ew-text-color').value : null;

            if(w.data.action === 'space' && !appState.spaces[w.id]) appState.spaces[w.id] = { title: w.data.title, widgets: [] };
            if(w.data.action === 'space' && appState.spaces[w.id]) appState.spaces[w.id].title = w.data.title;
            saveState(); closeModals(); renderDashboard();
        }
        async function saveBasicWidget() {
            const w = getCurrentWidgets().find(w => w.id === currentEditId);
            
            w.data.transparent = document.getElementById('eb-trans').checked;
            w.data.textColor = document.getElementById('eb-use-text-color').checked ? document.getElementById('eb-text-color').value : null;

            if(w.type === 'weather') { w.data.city = document.getElementById('eb-city').value; fetchWeather(w, false); }
            if(w.type === 'timer') { 
                w.data.timerMinutes = parseFloat(document.getElementById('eb-timer-min').value) || 25; 
                w.data.direction = document.getElementById('eb-timer-dir').value; 
                w.data.accentColor = document.getElementById('eb-use-accent-color')?.checked ? document.getElementById('eb-accent-color').value : null;
                resetTimer(w.id); 
            }
            if(w.type === 'clock') { 
                w.data.overlay = document.getElementById('eb-img-overlay') ? document.getElementById('eb-img-overlay').checked : true;
                w.data.customTime = document.getElementById('eb-clock-custom')?.checked;
                w.data.timeCity = document.getElementById('eb-clock-city')?.value || '';
                if(w.data.customTime && w.data.timeCity) {
                    w.data.timeZone = await resolveTimeZone(w.data.timeCity);
                } else {
                    w.data.timeZone = null;
                }
            }
            if(w.type === 'calendar' || w.type === 'notes') { w.data.accentColor = document.getElementById('eb-use-accent-color')?.checked ? document.getElementById('eb-accent-color').value : null; }
            
            saveState(); closeModals(); renderDashboard();
        }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => { m.classList.add('opacity-0'); setTimeout(()=>m.classList.add('hidden'), 300); }); currentEditId = null; }

        function duplicateWidget() {
            const w = getCurrentWidgets().find(w => w.id === currentEditId);
            if(!w) return;
            const newId = 'w_' + Date.now();
            const clone = JSON.parse(JSON.stringify(w));
            clone.id = newId;
            getCurrentWidgets().push(clone);
            if (clone.type === 'smart' && clone.data.action === 'space' && appState.spaces[w.id]) {
                appState.spaces[newId] = JSON.parse(JSON.stringify(appState.spaces[w.id]));
            }
            saveState();
            closeModals();
            renderDashboard();
            showToast("Widget Duplicated");
        }

        function initSortable() {
            const grid = document.getElementById('bento-grid'); if(sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(grid, {
                animation: 250, disabled: !isEditMode, ghostClass: 'opacity-0', filter: '.resize-handle, .no-jiggle', preventOnFilter: false,
                onEnd: function () {
                    const newOrderIds = Array.from(grid.children).map(el => el.dataset.id);
                    appState.spaces[spaceStack[spaceStack.length - 1]].widgets = newOrderIds.map(id => getCurrentWidgets().find(w => w.id === id)).filter(Boolean);
                    saveState();
                }
            });
        }
        function toggleEditMode() {
            isEditMode = !isEditMode; document.body.classList.toggle('edit-mode');
            const btnEdit = document.getElementById('btn-edit-mode'), footer = document.getElementById('edit-footer');
            if(isEditMode) {
                if(isSearching) toggleSearch(); btnEdit.classList.add('opacity-0', 'pointer-events-none'); footer.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-10');
            } else { btnEdit.classList.remove('opacity-0', 'pointer-events-none'); footer.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10'); }
            renderDashboard();
        }
        function toggleProfileModal() { showModal('profile-modal'); }
        
        function addWidget(type, w, h) {
            const newId = 'w_' + Date.now(); let data = {};
            if(type === 'spacer') data = { transparent: true };
            if(type === 'smart') data = { action: 'none', title: 'New', content: '', icon: 'star', isEmoji: false, bgImage: null, overlay: true };
            if(type === 'weather') data = { city: 'London', transparent: false };
            if(type === 'clock' || type === 'calendar') data = { transparent: false };
            if(type === 'timer') data = { timerMinutes: 25, direction: 'down', transparent: false, playSound: true };
            if(type === 'notes') data = { text: '', title: '' };

            getCurrentWidgets().push({ id: newId, type, w, h, data });
            if(type === 'smart' && data.action === 'space') appState.spaces[newId] = { title: 'Folder', widgets: [] };
            saveState(); closeModals(); renderDashboard(); setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 200);
        }
        function deleteWidget(id) {
            const spaceId = spaceStack[spaceStack.length - 1]; appState.spaces[spaceId].widgets = appState.spaces[spaceId].widgets.filter(w => w.id !== id);
            if(appState.spaces[id]) delete appState.spaces[id]; saveState(); renderDashboard();
        }

            const m = document.getElementById('settings-modal');

                    tempSettings = JSON.parse(JSON.stringify(appState.settings));
                    updateSettingsUI(tempSettings); showModal('settings-modal');

            } else { cancelSettings(); }
        }

            applyThemeAndBg(appState.settings); 
            hideModal('settings-modal');
        }

        function applySettings() {
            appState.settings = JSON.parse(JSON.stringify(tempSettings));
            saveState();
            hideModal('settings-modal');
            renderDashboard(); 
        }

        let peekTimeout;
        function startPeek() { 
            clearTimeout(peekTimeout); 
            document.body.classList.add('peek-mode'); 
            document.addEventListener('mouseup', endPeek, {once: true}); 
            document.addEventListener('touchend', endPeek, {once: true}); 
        }
        function endPeek() { 
            peekTimeout = setTimeout(()=>{ 
                document.body.classList.remove('peek-mode'); 
            }, 200); 
        }

        function setTempTheme(t) { tempSettings.theme = t; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }
        function setTempFont(f) { tempSettings.fontFamily = f; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }
        function setTempWidgetStyle(s) { tempSettings.widgetBgMode = s; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }
        function setTempBgType(t) { tempSettings.bgType = t; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }

        function updateTempSettings() {
            try {
                const isD = tempSettings.theme === 'dark' || (tempSettings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                const c1 = document.getElementById('color1').value, c2 = document.getElementById('color2').value;
                tempSettings.angle = document.getElementById('angle').value;
                const colorWidget = document.getElementById('colorWidget');
                if(colorWidget) {
                    if (typeof tempSettings.widgetBgColor === 'string') {
                        tempSettings.widgetBgColor = { light: '#ffffff', dark: '#1a1a1a' };
                    }
                    if (isD) tempSettings.widgetBgColor.dark = colorWidget.value;
                    else tempSettings.widgetBgColor.light = colorWidget.value;
                }
                if(isD) { tempSettings.darkColors.c1 = c1; tempSettings.darkColors.c2 = c2; } else { tempSettings.lightColors.c1 = c1; tempSettings.lightColors.c2 = c2; }
                applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings);
            } catch(e) {}
        }

        function updateTempTextColor(val) {
            try {
                tempSettings.customTextColor = val;
                applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings);
            } catch(e) {}
        }

        function updateTempAccentColor(val) {
            try {
                tempSettings.accentColor = val;
                applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings);
            } catch(e) {}
        }

        function updateTempHex(id) {
            try {
                const isD = tempSettings.theme === 'dark' || (tempSettings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                const val = document.getElementById(`hex${id}`).value;
                
                if(id === 'Text') {
                    tempSettings.customTextColor = val;
                } else if(id === 'Accent') {
                    tempSettings.accentColor = val;
                } else if(id === 'Widget') {
                    if (typeof tempSettings.widgetBgColor === 'string') { tempSettings.widgetBgColor = { light: '#ffffff', dark: '#1a1a1a' }; }
                    if (isD) tempSettings.widgetBgColor.dark = val; else tempSettings.widgetBgColor.light = val;
                    document.getElementById(`colorWidget`).value = val;
                } else {
                    document.getElementById(`color${id}`).value = val; 
                    if(isD) tempSettings.darkColors[`c${id}`] = val; else tempSettings.lightColors[`c${id}`] = val;
                }
                
                applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings);
            } catch(e) {}
        }

        function resetTempTextColor() { tempSettings.customTextColor = null; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }
        function resetTempAccentColor() { tempSettings.accentColor = '#ef4444'; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }
        function resetTempWidgetColor() { 
            if(typeof tempSettings.widgetBgColor !== 'object') tempSettings.widgetBgColor = { light: '#ffffff', dark: '#1a1a1a' };
            const isD = tempSettings.theme === 'dark' || (tempSettings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if(isD) tempSettings.widgetBgColor.dark = '#1a1a1a'; else tempSettings.widgetBgColor.light = '#ffffff';
            applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings);
        }
        function resetTempBgColor(num) {
            const isD = tempSettings.theme === 'dark' || (tempSettings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if(isD) { tempSettings.darkColors[`c${num}`] = DARK_DEFAULTS[`c${num}`]; }
            else { tempSettings.lightColors[`c${num}`] = LIGHT_DEFAULTS[`c${num}`]; }
            applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings);
        }

        function updateSettingsUI(s = tempSettings) {
            try {
                ['system','light','dark'].forEach(t => { const el = document.getElementById('btn-theme-'+t); if(el) el.className = t === s.theme ? 'flex-1 py-1.5 rounded-lg text-sm font-bold bg-black/10 dark:bg-white/10 text-current shadow-sm transition cursor-pointer' : 'flex-1 py-1.5 rounded-lg text-sm font-medium opacity-50 hover:opacity-100 transition cursor-pointer text-current'; });
                ['inter','serif','mono','caveat'].forEach(f => { const el = document.getElementById('btn-font-'+f); if(el) el.className = f === s.fontFamily ? `flex-1 py-1.5 rounded-lg text-sm font-bold bg-black/10 dark:bg-white/10 text-current shadow-sm transition cursor-pointer font-${f}` : `flex-1 py-1.5 rounded-lg text-sm font-medium opacity-50 hover:opacity-100 transition cursor-pointer font-${f} text-current`; });
                ['glass','solid','transparent'].forEach(style => { const el = document.getElementById('btn-ws-'+style); if(el) el.className = style === s.widgetBgMode ? 'flex-1 py-1.5 rounded-lg text-sm font-bold bg-black/10 dark:bg-white/10 text-current shadow-sm transition cursor-pointer' : 'flex-1 py-1.5 rounded-lg text-sm font-medium opacity-50 hover:opacity-100 transition cursor-pointer text-current'; });
                ['gradient','solid','image'].forEach(b => { const el = document.getElementById('btn-bg-'+b); if(el) el.className = b === s.bgType ? 'flex-1 py-1.5 rounded-lg text-xs font-bold bg-black/10 dark:bg-white/10 text-current shadow-sm transition cursor-pointer' : 'flex-1 py-1.5 rounded-lg text-xs font-medium opacity-50 hover:opacity-100 transition cursor-pointer text-current'; });
                
                const wWrap = document.getElementById('widget-color-wrap'); if(wWrap) wWrap.style.display = s.widgetBgMode === 'solid' ? 'flex' : 'none';
                const bgColBlock = document.getElementById('bg-colors-block'); if(bgColBlock) bgColBlock.style.display = s.bgType !== 'image' ? 'flex' : 'none';
                const wrapC2 = document.getElementById('wrap-c2'); if(wrapC2) wrapC2.style.display = s.bgType === 'gradient' ? 'flex' : 'none';
                const wrapAngle = document.getElementById('wrap-angle'); if(wrapAngle) wrapAngle.style.display = s.bgType === 'gradient' ? 'flex' : 'none';
                const bgImgBlock = document.getElementById('bg-image-block'); if(bgImgBlock) bgImgBlock.style.display = s.bgType === 'image' ? 'flex' : 'none';

                const isD = s.theme === 'dark' || (s.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                const c = isD ? (s.darkColors || DARK_DEFAULTS) : (s.lightColors || LIGHT_DEFAULTS);
                
                const wrapC1 = document.getElementById('wrap-c1'); 
                if(wrapC1) {
                    wrapC1.querySelector('.color-dot').style.backgroundColor = c.c1;
                    document.getElementById('lbl-c1').innerText = s.bgType === 'gradient' ? 'Color 1' : 'Background';
                }
                const wrapC2el = document.getElementById('wrap-c2'); if(wrapC2el) wrapC2el.querySelector('.color-dot').style.backgroundColor = c.c2;
                
                const hex1 = document.getElementById('hex1'); if(hex1 && document.activeElement !== hex1) hex1.value = c.c1; 
                const hex2 = document.getElementById('hex2'); if(hex2 && document.activeElement !== hex2) hex2.value = c.c2;
                const angleVal = document.getElementById('angle-val'); if(angleVal) angleVal.innerText = s.angle + '°';
                
                const btnTrashBg = document.getElementById('btn-trash-bg'); 
                const mainBgLabel = document.getElementById('main-bg-upload-label');
                if(btnTrashBg) btnTrashBg.style.display = s.bgImage ? 'block' : 'none';
                if(mainBgLabel) mainBgLabel.innerHTML = `${s.bgImage ? 'Replace Image' : 'Upload Image'} <input type="file" id="bg-upload" class="hidden" accept="image/*" onchange="handleTempBgImageUpload(event)">`;

                const tCol = s.customTextColor || (isD ? '#ffffff' : '#000000');
                const cpWrapText = document.getElementById('cp-wrap-text'); if(cpWrapText) cpWrapText.style.backgroundColor = tCol; 
                const hexText = document.getElementById('hexText'); if(hexText && document.activeElement !== hexText) hexText.value = tCol;
                
                const aCol = s.accentColor || '#ef4444';
                const cpWrapAccent = document.getElementById('cp-wrap-accent'); if(cpWrapAccent) cpWrapAccent.style.backgroundColor = aCol; 
                const hexAccent = document.getElementById('hexAccent'); if(hexAccent && document.activeElement !== hexAccent) hexAccent.value = aCol;
                
                let wCol = isD ? '#1a1a1a' : '#ffffff';
                if (s.widgetBgColor && typeof s.widgetBgColor === 'object') { wCol = isD ? s.widgetBgColor.dark : s.widgetBgColor.light; } 
                else if (typeof s.widgetBgColor === 'string') { wCol = s.widgetBgColor; }

                const cpWrapWidget = document.getElementById('cp-wrap-widget'); if(cpWrapWidget) cpWrapWidget.style.backgroundColor = wCol; 
                const colorWidget = document.getElementById('colorWidget'); if(colorWidget) colorWidget.value = wCol;
                const hexWidget = document.getElementById('hexWidget'); if(hexWidget && document.activeElement !== hexWidget) hexWidget.value = wCol;
            } catch(e) {}
        }

        function applyThemeAndBg(s = appState.settings) {
            const body = document.documentElement;
            const isD = s.theme === 'dark' || (s.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            isD ? body.classList.add('dark') : body.classList.remove('dark');
            
            body.className = body.className.replace(/font-\w+/g, '').trim(); body.classList.add(`font-${s.fontFamily}`);

            document.documentElement.style.setProperty('--accent-color', s.accentColor || '#ef4444');

            const bg = document.getElementById('body-bg');
            if(s.bgType === 'image' && s.bgImage) { bg.style.background = `url(${s.bgImage}) center/cover no-repeat fixed`; }
            else { 
                const c = isD ? (s.darkColors || DARK_DEFAULTS) : (s.lightColors || LIGHT_DEFAULTS); 
                bg.style.background = s.bgType === 'gradient' ? `linear-gradient(${s.angle}deg, ${c.c1}, ${c.c2})` : c.c1;
            }
            
            if(s.widgetBgMode === 'solid') {
                let wCol = isD ? '#1a1a1a' : '#ffffff';
                if (s.widgetBgColor && typeof s.widgetBgColor === 'object') { wCol = isD ? s.widgetBgColor.dark : s.widgetBgColor.light; } 
                else if (typeof s.widgetBgColor === 'string') { wCol = s.widgetBgColor; }
                
                document.documentElement.style.setProperty('--widget-bg', wCol); 
                document.documentElement.style.setProperty('--widget-blur', '0px'); 
                document.documentElement.style.setProperty('--widget-border', 'transparent'); 
                document.documentElement.style.setProperty('--widget-shadow-outer', 'none');
                document.documentElement.style.setProperty('--widget-shadow-inner', 'none');
                
                if(!s.customTextColor) {
                    document.documentElement.style.setProperty('--custom-text', isD ? '#ffffff' : '#000000');
                    document.body.classList.add('custom-text-active');
                } else {
                    document.documentElement.style.setProperty('--custom-text', s.customTextColor);
                    document.body.classList.add('custom-text-active');
                }
            } else if(s.widgetBgMode === 'transparent') {
                document.documentElement.style.setProperty('--widget-bg', 'transparent'); 
                document.documentElement.style.setProperty('--widget-blur', '0px'); 
                document.documentElement.style.setProperty('--widget-border', 'transparent'); 
                document.documentElement.style.setProperty('--widget-shadow-outer', 'none');
                document.documentElement.style.setProperty('--widget-shadow-inner', 'none');
                if(s.customTextColor) { document.documentElement.style.setProperty('--custom-text', s.customTextColor); document.body.classList.add('custom-text-active'); } 
                else { document.body.classList.remove('custom-text-active'); }
            } else {
                document.documentElement.style.setProperty('--widget-bg', isD ? 'rgba(30, 30, 30, 0.4)' : 'rgba(255, 255, 255, 0.3)'); 
                document.documentElement.style.setProperty('--widget-blur', '32px'); 
                document.documentElement.style.setProperty('--widget-border', isD ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.4)'); 
                document.documentElement.style.setProperty('--widget-shadow-outer', isD ? '0 8px 32px 0 rgba(0, 0, 0, 0.3)' : '0 8px 32px 0 rgba(0, 0, 0, 0.05)');
                document.documentElement.style.setProperty('--widget-shadow-inner', isD ? 'inset 0 1px 1px rgba(255, 255, 255, 0.05)' : 'inset 0 1px 1px rgba(255, 255, 255, 0.5)');
                
                if(s.customTextColor) { document.documentElement.style.setProperty('--custom-text', s.customTextColor); document.body.classList.add('custom-text-active'); } 
                else { document.body.classList.remove('custom-text-active'); }
            }
        }

        function compressImage(file, callback) { const r = new FileReader(); r.onload = e => { const img = new Image(); img.onload = () => { const cvs = document.createElement('canvas'); const MAX = 1600; let w = img.width, h = img.height; if(w > h && w > MAX) { h *= MAX/w; w = MAX; } else if(h > MAX) { w *= MAX/h; h = MAX; } cvs.width = w; cvs.height = h; cvs.getContext('2d').drawImage(img, 0, 0, w, h); callback(cvs.toDataURL('image/jpeg', 0.8)); }; img.src = e.target.result; }; r.readAsDataURL(file); }
        function handleTempBgImageUpload(e) { const f = e.target.files[0]; if(!f) return; showToast("Uploading..."); compressImage(f, base64 => { tempSettings.bgImage = base64; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); showToast("Background Set!"); }); }
        function clearTempBgImage() { tempSettings.bgImage = null; applyThemeAndBg(tempSettings); updateSettingsUI(tempSettings); }
        
        function exportData() { const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2)); const a = document.createElement('a'); a.href = d; a.download = "startpage.json"; document.body.appendChild(a); a.click(); a.remove(); }
        function importData(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if(d.spaces) { appState = d; saveState(); location.reload(); } } catch(err) { alert("Invalid file."); } }; r.readAsText(f); }

        function showModal(id) { 
            const m = document.getElementById(id); 
            if(m) { m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10); }
        }

        function hideModal(id) { 
            const m = document.getElementById(id); 
            if(m) { m.classList.add('opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); }
        }
    </script>
</body>
</html>
